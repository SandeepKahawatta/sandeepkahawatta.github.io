<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1600" height="900" fill="#fcfbf9"/>
  <rect x="20" y="20" width="1560" height="860" fill="none" stroke="#0d121b" stroke-width="6"/>
  <rect x="36" y="36" width="1528" height="828" fill="none" stroke="#0d121b" stroke-width="2"/>

  <!-- road grid -->
  <g stroke="#0d121b" stroke-width="3" opacity="0.25">
    <line x1="400" y1="60" x2="400" y2="840"/>
    <line x1="800" y1="60" x2="800" y2="840"/>
    <line x1="1200" y1="60" x2="1200" y2="840"/>
    <line x1="60" y1="300" x2="1540" y2="300"/>
    <line x1="60" y1="600" x2="1540" y2="600"/>
  </g>

  <!-- graph edges -->
  <g stroke="#0d121b" stroke-width="4" opacity="0.6">
    <line x1="400" y1="300" x2="800" y2="300"/>
    <line x1="800" y1="300" x2="1200" y2="300"/>
    <line x1="400" y1="600" x2="800" y2="600"/>
    <line x1="800" y1="600" x2="1200" y2="600"/>
    <line x1="400" y1="300" x2="400" y2="600"/>
    <line x1="800" y1="300" x2="800" y2="600"/>
    <line x1="1200" y1="300" x2="1200" y2="600"/>
    <line x1="400" y1="300" x2="800" y2="600" stroke-dasharray="10 8"/>
    <line x1="800" y1="300" x2="1200" y2="600" stroke-dasharray="10 8"/>
  </g>

  <!-- intersection nodes as traffic lights -->
  <g>
    <g transform="translate(400,300)">
      <circle r="34" fill="#0d121b"/><circle r="12" cy="-10" fill="#fcfbf9"/><circle r="12" cy="14" fill="#d32f2f"/>
    </g>
    <g transform="translate(800,300)">
      <circle r="34" fill="#0d121b"/><circle r="12" cy="-10" fill="#4caf50"/><circle r="12" cy="14" fill="#fcfbf9"/>
    </g>
    <g transform="translate(1200,300)">
      <circle r="34" fill="#0d121b"/><circle r="12" cy="-10" fill="#fcfbf9"/><circle r="12" cy="14" fill="#4caf50"/>
    </g>
    <g transform="translate(400,600)">
      <circle r="34" fill="#0d121b"/><circle r="12" cy="-10" fill="#d32f2f"/><circle r="12" cy="14" fill="#fcfbf9"/>
    </g>
    <g transform="translate(800,600)">
      <circle r="34" fill="#0d121b"/><circle r="12" cy="-10" fill="#fcfbf9"/><circle r="12" cy="14" fill="#4caf50"/>
    </g>
    <g transform="translate(1200,600)">
      <circle r="34" fill="#0d121b"/><circle r="12" cy="-10" fill="#4caf50"/><circle r="12" cy="14" fill="#fcfbf9"/>
    </g>
  </g>

  <!-- headline stat -->
  <rect x="1010" y="80" width="500" height="170" fill="#0d121b"/>
  <text x="1260" y="180" text-anchor="middle" fill="#fcfbf9" font-size="96" font-weight="bold">-81.8%</text>
  <text x="1260" y="228" text-anchor="middle" fill="#fcfbf9" font-size="30" letter-spacing="4">NETWORK WAITING TIME</text>

  <!-- caption -->
  <rect x="90" y="700" width="760" height="120" fill="#fcfbf9" stroke="#0d121b" stroke-width="3"/>
  <text x="120" y="752" font-size="44" font-weight="bold" fill="#0d121b">MULTI-AGENT TRAFFIC SIGNAL CONTROL</text>
  <text x="120" y="796" font-size="28" font-style="italic" fill="#0d121b">UQ-RecurrentHGAT — HGAT + MAPPO + Bayesian UQ</text>
  <text x="120" y="120" font-size="26" letter-spacing="6" fill="#0d121b">FIG 2.1 — FINAL YEAR RESEARCH</text>
</svg>
