<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1600" height="900" fill="#fcfbf9"/>
  <rect x="20" y="20" width="1560" height="860" fill="none" stroke="#0d121b" stroke-width="6"/>
  <rect x="36" y="36" width="1528" height="828" fill="none" stroke="#0d121b" stroke-width="2"/>

  <!-- browser chrome -->
  <rect x="120" y="110" width="1360" height="680" fill="#ffffff" stroke="#0d121b" stroke-width="4"/>
  <line x1="120" y1="180" x2="1480" y2="180" stroke="#0d121b" stroke-width="4"/>
  <circle cx="165" cy="145" r="12" fill="#0d121b"/>
  <circle cx="205" cy="145" r="12" fill="#0d121b" opacity="0.5"/>
  <circle cx="245" cy="145" r="12" fill="#0d121b" opacity="0.25"/>

  <!-- sidebar -->
  <rect x="120" y="180" width="300" height="610" fill="#0d121b"/>
  <g fill="#fcfbf9" font-size="30" letter-spacing="2">
    <text x="160" y="260" font-weight="bold">ADMIN</text>
    <text x="160" y="330" opacity="0.7">Teachers</text>
    <text x="160" y="390" opacity="0.7">Students</text>
    <text x="160" y="450" opacity="0.7">Exams</text>
    <text x="160" y="510" opacity="0.7">Attendance</text>
    <text x="160" y="570" opacity="0.7">Live Chat</text>
  </g>

  <!-- bar chart -->
  <g fill="#0d121b">
    <rect x="500" y="500" width="70" height="220"/>
    <rect x="600" y="430" width="70" height="290" opacity="0.8"/>
    <rect x="700" y="560" width="70" height="160" opacity="0.6"/>
    <rect x="800" y="380" width="70" height="340" opacity="0.9"/>
    <rect x="900" y="470" width="70" height="250" opacity="0.7"/>
  </g>
  <line x1="480" y1="720" x2="1000" y2="720" stroke="#0d121b" stroke-width="4"/>
  <text x="500" y="330" font-size="40" font-weight="bold" fill="#0d121b">GRADE ANALYTICS</text>
  <text x="500" y="375" font-size="26" font-style="italic" fill="#0d121b" opacity="0.7">Bell-curve &amp; attendance insights</text>

  <!-- QR attendance card -->
  <rect x="1080" y="260" width="330" height="400" fill="#fcfbf9" stroke="#0d121b" stroke-width="4"/>
  <text x="1245" y="320" text-anchor="middle" font-size="30" font-weight="bold" fill="#0d121b">QR ATTENDANCE</text>
  <g fill="#0d121b" transform="translate(1130,350)">
    <rect width="60" height="60"/><rect x="170" width="60" height="60"/><rect y="170" width="60" height="60"/>
    <rect x="80" y="10" width="25" height="25"/><rect x="120" y="45" width="25" height="25"/>
    <rect x="80" y="90" width="25" height="25"/><rect x="35" y="120" width="25" height="25"/>
    <rect x="130" y="130" width="25" height="25"/><rect x="180" y="90" width="25" height="25"/>
    <rect x="90" y="180" width="25" height="25"/><rect x="180" y="170" width="60" height="60" opacity="0.4"/>
  </g>
  <text x="1245" y="630" text-anchor="middle" font-size="24" font-style="italic" fill="#0d121b">Rotating anti-fraud codes</text>

  <!-- caption -->
  <text x="120" y="90" font-size="26" letter-spacing="6" fill="#0d121b">FIG 2.2 — LEARNING MANAGEMENT SYSTEM</text>
  <rect x="440" y="200" width="620" height="70" fill="#0d121b"/>
  <text x="750" y="248" text-anchor="middle" fill="#fcfbf9" font-size="36" font-weight="bold" letter-spacing="3">MULTI-ROLE LMS PLATFORM</text>
</svg>
